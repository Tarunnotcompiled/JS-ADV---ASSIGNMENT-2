<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌤 Async Weather Tracker</h1>
</header>

<div class="container">

    <div class="card weatherForm">
        <h3>Search City</h3>

        <form>
            <input type="text" id="city" placeholder="Enter city name" required>
            <button type="submit">Search</button>
        </form>

        <h4>Search History</h4>
        <br>
        <div id="HistoryBtn"></div>
    </div>

    <div class="card info">
        <h3>Weather Info</h3>
        <p>Search for a city to see weather details</p>
    </div>

</div>

<div class="console-section">
    <h3>Console – Event Loop</h3>
    <div class="console" id="consoleBox"></div>
</div>

<script src="script.js"></script>
</body>
</html>
